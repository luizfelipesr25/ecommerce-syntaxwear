<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SyntaxWear é a sua loja online de tênis e
    sneakers, oferecendo os melhores modelos para você arrasar no estilo.
    Encontre modelos, exclusivos, ofertas imperdíveis e frete grátis para todo o
    Brasil." />
    <title>SyntaxWear | E-commerce de Moda Tech</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components/header.css" />
    <link rel="stylesheet" href="./css/components/hero.css" />
    <link rel="stylesheet" href="./css/components/product-category.css" />
    <link rel="stylesheet" href="./css/components/product-grid.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="logo">
        <a href="#" title="SyntaxWear - Tênis e Sneakers Online">
          <img
            src="./images/logo/logo.svg"
            alt="SyntaxWear - Tênis e Sneakers Online"
          />
        </a>
      </h1>
      <nav class="nav-center" aria-label="Categorias Principais">
        <ul>
          <li><a href="#">Produtos</a></li>
          <li><a href="#">Sobre</a></li>
          <li><a href="#">Contato</a></li>
        </ul>
      </nav>
      <nav class="nav-right" aria-label="Acesso rápido">
        <ul>
          <li><a href="#">Nossas lojas</a></li>
          <li><a href="#">Sobre</a></li>
          <li>
            <a href="#" title="Perfil" aria-label="Minha conta">
              <img src="./images/icons/user.svg" alt="Minha conta" />
            </a>
          </li>
          <li>
            <a href="#" title="Ajuda" aria-label="Ajuda">
              <img src="./images/icons/help.svg" alt="Ajuda" />
            </a>
          </li>
          <li>
            <a href="#" title="Carrinho" aria-label="Carrinho">
              <img src="./images/icons/bag.svg" alt="Carrinho" />
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero-section">
        <div class="hero-overlay">
          <div class="hero-content">
            <span class="hero-title">Krypton One</span>
            <h2 class="hero-subtitle">Transforme qualquer passo em presença</h2>
            <div class="hero-buttons">
              <a href="#" class="btn btn-outline">Ver modelos</a>
              <a href="#" class="btn btn-filled">Comprar</a>
            </div>
          </div>
        </div>
      </section>
      <section class="categories-section">
        <div class="category-card casual">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Casual</span>
          </a>
        </div>
        <div class="category-card esportivo">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Esporte</span>
          </a>
        </div>
        <div class="category-card moderno">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Moderno</span>
          </a>
        </div>
        <div class="category-card futurista">
          <a href="#" class="category-link">
            <span class="overlay"></span>
            <span class="category-name btn btn-outline">Futurista</span>
          </a>
        </div>
      </section>
      <section class="grid-section">
        <div class="card highlight">
          <div class="top1-content">
            <h3 class="card-title">Krypton One</h3>
            <p class="card-subtitle">Estilo Urbano com atitude</p>
            <div class="cta-group">
              <a href="#" class="btn btn-outline">Feminino</a>
              <a href="#" class="btn btn-outline">Masculino</a>
            </div>
          </div>
        </div>      
        <div class="card sneaker-purple"></div>      
        <div class="card model"></div>      
        <div class="card sneaker-color"></div>      
        <div class="card sneaker-white"></div>      
        <div class="card sneaker-silver"></div>
      </section>
    </main>
    <footer>
      <div class="container"></div>
    </footer>
  </body>
</html>
